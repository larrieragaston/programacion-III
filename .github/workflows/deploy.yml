name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build all presentations
        run: |
          SITE_DIR="${GITHUB_WORKSPACE}/_site"
          rm -rf "$SITE_DIR"
          mkdir -p "$SITE_DIR"

          cp index.html "$SITE_DIR/"
          cp index.css "$SITE_DIR/" 2>/dev/null || true
          cp index.js "$SITE_DIR/" 2>/dev/null || true
          cp favicon.svg "$SITE_DIR/" 2>/dev/null || true
          cp logo-inspt.png "$SITE_DIR/" 2>/dev/null || true

          for dir in */; do
            if [ -f "${dir}package.json" ] && grep -q "slidev" "${dir}package.json"; then
              echo "Building ${dir%/}..."
              cd "$dir"
              npm ci
              npm i -D playwright-chromium
              npx playwright install --with-deps chromium
              EXPORT_FILE="${dir%/}-slides-export.pdf"
              EXPORT_PATH="pdfs/exports/${EXPORT_FILE}"
              rm -f pdfs/exports/*.pdf slides-export.pdf *-slides-export.pdf *-export.pdf
              npm run export
              npm run build
              mkdir -p "$SITE_DIR/${dir%/}"
              cp -r dist/* "$SITE_DIR/${dir%/}/"
              if [ -f "$EXPORT_PATH" ]; then
                mkdir -p "$SITE_DIR/${dir%/}/pdfs/exports"
                cp "$EXPORT_PATH" "$SITE_DIR/${dir%/}/pdfs/exports/$EXPORT_FILE"
              fi
              cd ..
            fi
          done

          echo "Building lambda-calculus-docs (VitePress)..."
          cd "${GITHUB_WORKSPACE}/lambda-calculus-docs"
          npm ci --ignore-scripts
          CI=true npm run docs:build
          mkdir -p "${SITE_DIR}/lambda-calculus-docs"
          cp -r docs/.vitepress/dist/* "${SITE_DIR}/lambda-calculus-docs/"
          cd "${GITHUB_WORKSPACE}"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
